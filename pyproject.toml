[project]
version = "0.26.0"
name = "tttrlib"
requires-python = ">=3.9"
description = "Read, write & process time-tagged time-resolved (TTTR) data."
readme = "README.md"
authors = [{ name = "Thomas-Otavio Peulen", email = "thomas.otavio.peulen@gmail.com" }]
license = { text = "BSD-3-Clause" }

keywords = [
    "fluorescence",
    "time-resolved",
    "spectroscopy",
    "imaging",
    "microscopy"
]

classifiers = [
    "Topic :: Software Development",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Image Processing",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: C++",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "numpy<2.0.0",
    "tqdm",
    "click",
    "click-didyoumean",
    "scikit-image",
    "matplotlib",
]

[project.urls]
homepage = "https://github.com/fluorescence-tools/tttrlib"
documentation = "https://docs.peulen.xyz/tttrlib"
repository = "https://github.com/fluorescence-tools/tttrlib.git"

[build-system]
requires = [
    "wheel",
    "setuptools>=64",
    "setuptools_scm>=8",
    "cmake-build-extension",
    "numpy<2.0.0",
    "swig<4.2",
    "ninja"
]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
# Fallback version when not in a git repo or when version is explicitly set
fallback_version = "0.26.0"

[tool.cibuildwheel]
build-verbosity = 2
skip = ["pp*", "*-win32", "*-manylinux_i686", "*-musllinux_*"]
test-command = "python -c \"import tttrlib; d = tttrlib.TTTR(); print(type(d).__name__)\""

[tool.cibuildwheel.macos]
# Newer C++ features with old SDK:
# https://conda-forge.org/docs/maintainer/knowledge_base.html
archs = ["arm64"]
before-all = [
    "brew install boost",
    "brew reinstall --build-from-source boost"
]
environment = {CFLAGS="-g -Wall", CXXFLAGS="${CXXFLAGS} -D_LIBCPP_DISABLE_AVAILABILITY=1", MACOSX_DEPLOYMENT_TARGET="11.0"}
# Bundle Boost dylibs into the wheel using delocate
repair-wheel-command = "delocate-listdeps {wheel} && delocate-wheel --require-archs {delocate_archs} --dylibs-only -w {dest_dir} -v {wheel}"

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "manylinux_2_28"
manylinux-aarch64-image = "manylinux_2_28"
archs = ["x86_64", "aarch64"]
before-all = [
    "dnf install -y boost-devel cmake hdf5-devel"
]
repair-wheel-command = "auditwheel repair -w {dest_dir} {wheel}"

[tool.cibuildwheel.windows]
archs = ["AMD64"]

# Build Boost once per run; install into {project}\dist\boost-install
before-all = "powershell -ExecutionPolicy Bypass -File .github/ci/build_boost_windows.ps1"

# Install delvewheel in the build environment for wheel repair
before-build = "pip install delvewheel"

# Bundle Boost DLLs into the wheel (and make them discoverable at import time)
# Read BOOST_LIB_PATH from .boost_env file and pass to delvewheel
repair-wheel-command = "powershell -Command \"$boost_lib = (Get-Content .boost_env | Select-String 'BOOST_LIB_PATH=').ToString().Split('=')[1]; python -m delvewheel repair --add-path $boost_lib -w {dest_dir} {wheel}\""

[tool.cibuildwheel.windows.environment]
# Use Visual Studio generator instead of Ninja
CMAKE_GENERATOR = "Visual Studio 17 2022"

# Avoid Boost auto-link surprises on MSVC
BOOST_ALL_NO_LIB = "1"

# Note: Boost paths are communicated via .boost_env file
# The build_boost_windows.ps1 script writes paths to .boost_env, and setup.py reads it
# The repair-wheel-command also reads BOOST_LIB_PATH from .boost_env for delvewheel
# Fallback: setup.py auto-detects from dist/boost-install if file doesn't exist
