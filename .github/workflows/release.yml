name: Release

on:
  release:
    types: [published]

env:
  DEFAULT_PYTHON: "3.10"
  CIBW_VERSION: "2.23.3"
  MAIN_PY_VERSIONS: "3.9 3.10 3.11 3.12 3.13"
  CONDA_CHANNEL: tpeulen

jobs:
  # Build and publish to PyPI
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Build wheels
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # Build and publish to conda (own channel)
  conda:
    name: Publish to Conda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: build
          use-mamba: true
          conda-remove-defaults: true

      - name: Install rattler-build
        run: conda install -y rattler-build -c conda-forge

      - name: Build Conda packages
        shell: bash -l {0}
        run: |
          export PKG_VERSION=$(python -c "import re; v=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(v.group(1))")
          echo "Building tttrlib $PKG_VERSION for Python ${{ env.MAIN_PY_VERSIONS }}"
          
          # Build for all Python versions
          for VER in ${{ env.MAIN_PY_VERSIONS }}; do
            echo "Building for Python $VER"
            rattler-build build --recipe rattler-recipe \
              --variant "python=$VER" \
              --output-dir ./conda-bld \
              -c conda-forge
          done

      - name: Upload to Conda
        shell: bash -l {0}
        run: |
          # Install anaconda-client for uploading
          conda install -y anaconda -c conda-forge
          
          # Upload all built packages to the specified channel
          anaconda upload --user ${{ env.CONDA_CHANNEL }} \
            --label main \
            --force \
            ./conda-bld/*/tttrlib-*.conda
