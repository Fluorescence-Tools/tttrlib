name: Documentation

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_docs:
    runs-on: ubuntu-latest
    env:
      TTTRLIB_DATA: ${{ github.workspace }}/tttr-data
      # Set to Tier 4 for full build (gallery, notebooks, citations)
      BUILD_TIER: 4

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev swig cmake pandoc doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Build requirements
          python -m pip install scikit-build-core numpy swig
          # Doc requirements
          python -m pip install sphinx sphinx-copybutton sphinx-design sphinxext-opengraph numpydoc nbsphinx matplotlib ipython sphinxcontrib-bibtex sphinx-gallery pydata-sphinx-theme scikit-image phconvert numba imagecodecs
          # Install package dependencies
          python -m pip install .[examples]

      - name: Cache Test Data
        id: cache-test-data
        uses: actions/cache@v4
        with:
          path: ./tttr-data
          # Cache key based on settings.json to invalidate if test data requirements change
          key: tttr-data-${{ hashFiles('test/settings.json') }}

      - name: Download Test Data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        run: |
          python -m pip install pooch
          python test/download_test_data.py --output-dir ./tttr-data
          # Also run verification to ensure integrity if needed, but download_test_data usually sufficient

      - name: Build Documentation
        run: |
          cd doc
          mkdir -p _build/api
          doxygen
          # Debug: show what conf.py sees
          python -c "import os; os.environ['BUILD_TIER']='4'; exec(open('conf.py').read())" 2>&1 | head -50 || true
          BUILD_TIER=4 sphinx-build -v -b html -T -d _build/doctrees . _build/html/stable 2>&1 | tee sphinx_build.log
          # Show what was built
          ls -la _build/html/stable/
          ls -la _build/html/stable/auto_examples 2>/dev/null || echo "No auto_examples directory"
          rm -rf _build/html/stable/api
          cp -r _build/api _build/html/stable/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: doc/_build/html/stable

      - name: Deploy to GitHub Pages (main/stable)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/_build/html/stable
          keep_files: true
          destination_dir: stable

      - name: Deploy to GitHub Pages (development/dev)
        if: github.ref == 'refs/heads/development'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/_build/html/stable
          keep_files: true
          destination_dir: dev
