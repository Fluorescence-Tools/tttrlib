name: Download Test Data

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  download-test-data:
    name: Download test data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Download test data
        run: |
          python test/download_test_data.py --output-dir ./tttr-data

      - name: Verify downloaded files
        env:
          TTTRLIB_DATA: ./tttr-data
        run: |
          python test/download_verify_test_data.py
      
      - name: Upload test data artifact
        uses: actions/upload-artifact@v4
        with:
          name: tttr-data-bundle
          path: ./tttr-data
          if-no-files-found: error
      
      - name: Cache test data
        if: always()
        uses: actions/cache/save@v3
        with:
          path: ./tttr-data
          key: tttr-test-data-${{ hashFiles('test/settings.json') }}
