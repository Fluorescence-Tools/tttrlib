name: Build wheels

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: build-wheels-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        os: ${{ fromJSON((github.actor == 'nektos/act') && '["ubuntu-latest"]' || '["ubuntu-latest", "windows-latest", "macos-13"]') }}
    # Don't require test data for building wheels, only for testing
    # The test job will handle cache restoration
        
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          check-latest: false

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        env:
          # Limited (dev/PR): oldest + newest. Full (main/master + releases): all supported.
          CIBW_BUILD: ${{ (((github.event_name == 'push' && github.ref == 'refs/heads/development') || github.event_name == 'pull_request') && 'cp310-* cp313-*') || 'cp39-* cp310-* cp311-* cp312-* cp313-*' }}
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  test_wheels:
    name: Test wheels on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJSON((github.actor == 'nektos/act') && '["ubuntu-latest"]' || '["ubuntu-latest", "windows-latest", "macos-13"]') }}
        python-version: ${{ fromJSON((((github.event_name == 'push' && github.ref == 'refs/heads/development') || github.event_name == 'pull_request') && '["3.10", "3.13"]') || '["3.9", "3.10", "3.11", "3.12", "3.13"]') }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-${{ matrix.os }}-*
          path: wheelhouse
          merge-multiple: true
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy scipy scikit-image nose
      
      - name: Restore test data from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ./tttr-data
          key: tttr-test-data-${{ hashFiles('test/settings.json') }}
          fail-on-cache-miss: false
      
      - name: Download test data if cache miss
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests
          python test/download_test_data.py --output-dir ./tttr-data
      
      - name: Install wheel
        shell: python
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          import glob
          import os
          import subprocess
          import sys

          python_version = os.environ["PYTHON_VERSION"]
          python_tag = "cp" + python_version.replace(".", "")
          print(f"Looking for wheels matching: {python_tag}")

          pattern = os.path.join("wheelhouse", f"*{python_tag}*.whl")
          wheels = sorted(glob.glob(pattern))

          if not wheels:
            print(f"No matching wheel found for Python {python_version}")
            for path in sorted(glob.glob(os.path.join("wheelhouse", "*.whl"))):
              print(f" - {path}")
            raise SystemExit(1)

          wheel = wheels[0]
          print(f"Installing: {wheel}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheel])
      
      - name: Run tests on installed wheel
        run: |
          pytest test/ -v --tb=short
        env:
          TTTRLIB_DATA: ./tttr-data

  publish_testpypi:
    name: Publish to TestPyPI
    needs: test_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.prerelease
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tttrlib
    permissions:
      id-token: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish_pypi:
    name: Publish to PyPI
    needs: test_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && !github.event.release.prerelease
    environment:
      name: pypi
      url: https://pypi.org/p/tttrlib
    permissions:
      id-token: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
