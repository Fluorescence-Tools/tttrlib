name: Build wheels

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]
        
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5

      - name: Install Boost (macOS)
        if: runner.os == 'macOS'
        run: brew install boost

      # Install Chocolatey if not present (for fast Boost installation)
      - name: Install Chocolatey (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Chocolatey..."
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          } else {
            Write-Host "Chocolatey already installed"
          }

      # Cache Boost build on Windows to avoid rebuilding
      # Caches both the downloaded/extracted files and the built installation
      - name: Cache Boost (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            dist/cache
            dist/boost-install-x64
            dist/boost-install-arm64
            C:\local\boost_*
          key: boost-choco-${{ runner.os }}-${{ runner.arch }}-v3
          restore-keys: |
            boost-choco-${{ runner.os }}-
            boost-1.86.0-windows-prebuilt-${{ runner.os }}-
            boost-1.86.0-windows-${{ runner.os }}-

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
