name: Build wheels

on:
  workflow_dispatch:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]
        
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          check-latest: false

      - name: Install Boost (macOS)
        if: runner.os == 'macOS'
        run: brew install boost

      # Cache vcpkg binary packages to avoid recompiling Boost
      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/packages
            C:/vcpkg/downloads
            C:/vcpkg/buildtrees
            C:/vcpkg/archives
            dist/boost-install-x64
            dist/boost-install-arm64
          key: vcpkg-boost-${{ runner.os }}-${{ hashFiles('.github/ci/boost-config.txt') }}-v3
          restore-keys: |
            vcpkg-boost-${{ runner.os }}-

      # Enable vcpkg binary caching
      - name: Setup vcpkg binary caching (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "VCPKG_BINARY_SOURCES=clear;files,C:/vcpkg/archives,readwrite" >> $env:GITHUB_ENV

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish_testpypi:
    name: Publish to TestPyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.prerelease
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tttrlib
    permissions:
      id-token: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish_pypi:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && !github.event.release.prerelease
    environment:
      name: pypi
      url: https://pypi.org/p/tttrlib
    permissions:
      id-token: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
