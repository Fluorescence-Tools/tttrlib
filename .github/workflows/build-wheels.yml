name: Build wheels

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]
        
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5

      - name: Install Boost (macOS)
        if: runner.os == 'macOS'
        run: brew install boost

      # Cache Boost build on Windows to avoid rebuilding
      # vcpkg and source builds are cached
      - name: Cache Boost (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            dist/cache
            dist/boost-install-x64
            dist/boost-install-arm64
            C:/vcpkg/installed
          key: boost-vcpkg-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: |
            boost-vcpkg-${{ runner.os }}-

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
