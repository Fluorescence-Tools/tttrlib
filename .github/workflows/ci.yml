name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

env:
  DEFAULT_PYTHON: "3.10"
  CIBW_VERSION: "2.23.3"
  # Space separated list of python versions for main build
  MAIN_PY_VERSIONS: "3.9 3.10 3.11 3.12 3.13"

jobs:
  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      pip_matrix: ${{ steps.set-matrix.outputs.pip_matrix }}
      conda_matrix: ${{ steps.set-matrix.outputs.conda_matrix }}
      pip_test_matrix: ${{ steps.set-matrix.outputs.pip_test_matrix }}
      conda_test_matrix: ${{ steps.set-matrix.outputs.conda_test_matrix }}
      is_main: ${{ steps.check-main.outputs.is_main }}
    steps:
      - id: check-main
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - id: set-matrix
        run: |
          BRANCH="${{ github.ref }}"
          # Full matrix for main and development branches: Linux, macOS, Windows
          if [[ "$BRANCH" == "refs/heads/main" || "$BRANCH" == "refs/heads/development" ]]; then
            # macos-15-intel is the Intel (x86_64) runner (macos-13 was removed Dec 2025)
            # macos-latest is arm64 (Apple Silicon); conda builds natively for arm64
            echo "pip_matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"lnx\"},{\"os\":\"macos-15-intel\",\"platform\":\"osx\"},{\"os\":\"windows-latest\",\"platform\":\"win\"}]}" >> $GITHUB_OUTPUT
            echo "conda_matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"lnx\"},{\"os\":\"macos-latest\",\"platform\":\"osx\"},{\"os\":\"windows-latest\",\"platform\":\"win\"}]}" >> $GITHUB_OUTPUT
            # Separate test matrices: pip tests use pip build artifacts, conda tests use conda build artifacts
            echo "pip_test_matrix={\"include\":[{\"runner\":\"ubuntu-24.04\",\"artifact_os\":\"ubuntu-latest\",\"platform\":\"lnx\"},{\"runner\":\"macos-15-intel\",\"artifact_os\":\"macos-15-intel\",\"platform\":\"osx\"},{\"runner\":\"windows-latest\",\"artifact_os\":\"windows-latest\",\"platform\":\"win\"}]}" >> $GITHUB_OUTPUT
            echo "conda_test_matrix={\"include\":[{\"runner\":\"ubuntu-24.04\",\"artifact_os\":\"ubuntu-latest\",\"platform\":\"lnx\"},{\"runner\":\"macos-latest\",\"artifact_os\":\"macos-latest\",\"platform\":\"osx\"},{\"runner\":\"windows-latest\",\"artifact_os\":\"windows-latest\",\"platform\":\"win\"}]}" >> $GITHUB_OUTPUT
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            # Linux only for other branches (cheaper CI)
            echo "pip_matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"lnx\"}]}" >> $GITHUB_OUTPUT
            echo "conda_matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"lnx\"}]}" >> $GITHUB_OUTPUT
            echo "pip_test_matrix={\"include\":[{\"runner\":\"ubuntu-24.04\",\"artifact_os\":\"ubuntu-latest\",\"platform\":\"lnx\"}]}" >> $GITHUB_OUTPUT
            echo "conda_test_matrix={\"include\":[{\"runner\":\"ubuntu-24.04\",\"artifact_os\":\"ubuntu-latest\",\"platform\":\"lnx\"}]}" >> $GITHUB_OUTPUT
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

  build_pip:
    name: Pip Build ${{ matrix.platform }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.pip_matrix)}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==${{ env.CIBW_VERSION }} uv

      - name: Install HDF5 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # vcpkg is pre-installed on the runner at VCPKG_INSTALLATION_ROOT
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          & $vcpkg install hdf5:x64-windows --no-print-usage
          $hdf5root = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "HDF5_ROOT=$hdf5root" >> $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$hdf5root" >> $env:GITHUB_ENV
          echo "PATH=$hdf5root\bin;$env:PATH" >> $env:GITHUB_ENV
          Write-Host "HDF5_ROOT set to $hdf5root"

      - name: Set CIBW environment
        shell: bash
        run: |
          echo "CIBW_SKIP=pp* *-win32 *-manylinux_i686 *-musllinux_* cp314-* cp314t-* cp313t-*" >> $GITHUB_ENV
          if [[ "${{ needs.setup.outputs.is_main }}" == "true" ]]; then
            # Convert "3.9 3.10" to "cp39-* cp310-*"
            BUILD_SPEC=$(echo "${{ env.MAIN_PY_VERSIONS }}" | sed 's/\([0-9]\)\.\([0-9]*\)/cp\1\2-*/g')
            echo "CIBW_BUILD=$BUILD_SPEC" >> $GITHUB_ENV
          else
            PY_VER_SHORT=$(echo "${{ env.DEFAULT_PYTHON }}" | sed 's/\.//')
            echo "CIBW_BUILD=cp${PY_VER_SHORT}-*" >> $GITHUB_ENV
          fi

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD_VERBOSITY: 2
          # Use uv instead of virtualenv to avoid downloading virtualenv.pyz
          # from GitHub (which hits HTTP 429 rate-limit errors)
          CIBW_BUILD_FRONTEND: "build[uv]"

      - uses: actions/upload-artifact@v4
        with:
          name: pip-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  test_pip:
    name: Pip Test ${{ matrix.platform }}
    needs: [setup, build_pip]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.pip_test_matrix)}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pip-wheels-${{ matrix.artifact_os }}
          path: wheelhouse
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
      - name: Cache test data
        id: cache-test-data
        uses: actions/cache@v4
        with:
          path: ./tttr-data
          key: tttr-test-data-${{ hashFiles('test/settings.json') }}

      - name: Download Test Data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        run: |
          python -m pip install pooch tqdm
          python test/download_test_data.py --output-dir ./tttr-data --quiet

      - name: Install and Test
        shell: bash
        env:
          TTTRLIB_DATA: ./tttr-data
        run: |
          python -m pip install --upgrade pip
          PY_VER_SHORT=$(echo "${{ env.DEFAULT_PYTHON }}" | sed 's/\.//')
          python -m pip install wheelhouse/*cp${PY_VER_SHORT}*.whl
          python -m pip install pytest scipy
          python -m pytest

  build_conda:
    name: Conda Build ${{ matrix.platform }}
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.conda_matrix)}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: tttrlib
          use-mamba: true
          conda-remove-defaults: true

      - name: Install rattler-build
        shell: bash -l {0}
        run: |
          conda install -y rattler-build -c conda-forge

      - name: Build Conda packages
        shell: bash -l {0}
        run: |
          if [[ "${{ needs.setup.outputs.is_main }}" == "true" ]]; then
            PY_VERSIONS="${{ env.MAIN_PY_VERSIONS }}"
          else
            PY_VERSIONS="${{ env.DEFAULT_PYTHON }}"
          fi
          # Extract version from pyproject.toml
          export PKG_VERSION=$(python -c "import re; v=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(v.group(1))")
          echo "Building tttrlib $PKG_VERSION"
          # On Windows, override the default MSVC compiler from vs2017 to vs2022.
          # conda-forge defaults to vs2017 whose activation scripts require the
          # v141 toolset (MSVC 14.16) which is not installed on GitHub Actions runners.
          COMPILER_VARIANTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            COMPILER_VARIANTS='--variant "c_compiler=vs2022" --variant "cxx_compiler=vs2022"'
          fi
          for VER in $PY_VERSIONS; do
            echo "Building for Python $VER on ${{ matrix.os }}"
            eval rattler-build build --recipe rattler-recipe \
              --variant "python=$VER" \
              $COMPILER_VARIANTS \
              --output-dir ./conda-bld \
              -c conda-forge
          done

      - uses: actions/upload-artifact@v4
        with:
          name: conda-packages-${{ matrix.os }}
          path: ./conda-bld

  test_conda:
    name: Conda Test ${{ matrix.platform }}
    needs: [setup, build_conda]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.conda_test_matrix)}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: conda-packages-${{ matrix.artifact_os }}
          path: conda-bld
      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: tttrlib
          use-mamba: true
          conda-remove-defaults: true
      - name: Cache test data
        id: cache-test-data
        uses: actions/cache@v4
        with:
          path: ./tttr-data
          key: tttr-test-data-${{ hashFiles('test/settings.json') }}
      - name: Download Test Data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          python -m pip install pooch tqdm
          python test/download_test_data.py --output-dir ./tttr-data --quiet
      - name: Install and Test
        shell: bash -l {0}
        env:
          TTTRLIB_DATA: ./tttr-data
        run: |
           conda install -y -c ./conda-bld/ tttrlib
           conda install -y pytest scipy
           python -m pytest

  build_docs:
    name: Build Documentation
    needs: [test_pip, test_conda]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    env:
      TTTRLIB_DATA: ${{ github.workspace }}/tttr-data
      BUILD_TIER: 4

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev swig cmake pandoc doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Build requirements
          python -m pip install scikit-build-core numpy swig
          # Doc requirements
          python -m pip install sphinx sphinx-copybutton sphinx-design sphinxext-opengraph numpydoc nbsphinx matplotlib ipython sphinxcontrib-bibtex sphinx-gallery pydata-sphinx-theme scikit-image phconvert numba imagecodecs
          # Install package dependencies
          python -m pip install .[examples]

      - name: Cache Test Data
        id: cache-test-data
        uses: actions/cache@v4
        with:
          path: ./tttr-data
          key: tttr-data-${{ hashFiles('test/settings.json') }}

      - name: Download Test Data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        run: |
          python -m pip install pooch
          python test/download_test_data.py --output-dir ./tttr-data

      - name: Build Documentation
        run: |
          cd doc
          mkdir -p _build/api
          doxygen
          BUILD_TIER=4 sphinx-build -v -b html -T -d _build/doctrees . _build/html/stable 2>&1 | tee sphinx_build.log
          ls -la _build/html/stable/
          ls -la _build/html/stable/auto_examples 2>/dev/null || echo "No auto_examples directory"
          rm -rf _build/html/stable/api
          cp -r _build/api _build/html/stable/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: doc/_build/html/stable

      - name: Deploy to GitHub Pages (main/stable)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/_build/html/stable
          keep_files: true
          destination_dir: stable

      - name: Deploy Root Redirect (main)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/static_root
          keep_files: true
          destination_dir: .

      - name: Deploy to GitHub Pages (development/dev)
        if: github.ref == 'refs/heads/development'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/_build/html/stable
          keep_files: true
          destination_dir: dev

      - name: Deploy Root Redirect (development)
        if: github.ref == 'refs/heads/development'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/static_root
          keep_files: true
          destination_dir: .
