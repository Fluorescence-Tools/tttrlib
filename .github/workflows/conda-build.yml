name: Conda Build

on:
  push:
  pull_request:
  workflow_run:
    workflows: ["Download Test Data"]
    types: [completed]
  workflow_dispatch:
  release:
    types: [ released, prereleased ]
  schedule:
    # Every Monday at 11:00 UTC
    - cron: "0 11 * * 1"

concurrency:
  group: conda-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: CondaBuild (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.10" ]

    env:
      OUT_DIR: conda-bld
      ANACONDA_USER: tpeulen
      ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
      # If it's a release, use "main"; else "dev"
      UPLOAD_LABEL: ${{ startsWith(github.ref, 'refs/tags/') && (github.event_name == 'release') && (github.event.action == 'released' || github.event.action == 'prereleased') && 'main' || 'dev' }}

    steps:
      - name: Checkout (with tags & submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "Set SDK on macOS (if needed)"
        if: startsWith(matrix.os, 'macos')
        run: tools/install_macos_sdk.sh

      - name: Configure MSVC for x64
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up micromamba (conda-forge strict)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          create-args: >-
            python=${{ matrix.python-version }}
            boa
            conda-build
            anaconda-client
            curl
          cache-downloads: true
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: strict

      - name: Display Conda Settings
        shell: bash -l {0}
        run: |
          micromamba run -n build conda info
          micromamba run -n build conda list
          micromamba run -n build conda config --show-sources
          micromamba run -n build conda config --show
          printenv | sort

      - name: Build (mambabuild)
        shell: bash -l {0}
        working-directory: conda-recipe
        run: |
          micromamba run -n build conda mambabuild . \
            --output-folder "${GITHUB_WORKSPACE}/${OUT_DIR}"

      - name: Upload to Anaconda.org (skip if no token)
        shell: bash -l {0}
        run: |
          if [[ -n "${ANACONDA_TOKEN}" ]]; then
            echo "Uploading packages to anaconda.org/${ANACONDA_USER} (label=${UPLOAD_LABEL})"
            micromamba run -n build anaconda -t "${ANACONDA_TOKEN}" upload \
              -u "${ANACONDA_USER}" \
              --label "${UPLOAD_LABEL}" \
              --force ${OUT_DIR}/**/*.tar.bz2
          else
            echo "ANACONDA_TOKEN is empty; skipping upload."
          fi

      - name: Keep built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conda-packages-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ env.OUT_DIR }}/**/*.tar.bz2

  test_conda:
    name: Test conda packages on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.10" ]
    env:
      # Use absolute path for TTTRLIB_DATA to avoid CWD-related confusion on all OSes
      TTTRLIB_DATA: ${{ github.workspace }}/tttr-data
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download conda packages
        uses: actions/download-artifact@v4
        with:
          pattern: conda-packages-${{ matrix.os }}-py${{ matrix.python-version }}
          path: conda-packages
          merge-multiple: true
      
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: test
          create-args: >-
            python=${{ matrix.python-version }}
            pytest
            pytest-cov
            numpy
            scipy
            requests
            scikit-image
            nose
            conda-build
            conda
          cache-downloads: true
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: strict
      
      - name: Restore test data from cache
        id: cache-test-data
        uses: actions/cache/restore@v3
        with:
          path: ./tttr-data
          key: tttr-test-data-${{ hashFiles('test/settings.json') }}
          fail-on-cache-miss: false
      
      - name: Download test data (fallback if cache missed)
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          micromamba run -n test python test/download_test_data.py --output-dir "$TTTRLIB_DATA"
      
      - name: Verify test data presence
        shell: bash -l {0}
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "TTTRLIB_DATA: $TTTRLIB_DATA"
          python -c "import os; print('TTTRLIB_DATA env seen by Python =', os.getenv('TTTRLIB_DATA'))"
          # Use the repository's canonical verifier which reads test/settings.json
          micromamba run -n test python test/download_verify_test_data.py --list-only || true
          micromamba run -n test python test/download_verify_test_data.py
      
      - name: Index conda packages
        shell: bash -l {0}
        run: |
          micromamba run -n test conda index ./conda-packages
      
      - name: Install conda package into test env
        shell: bash -l {0}
        run: |
          micromamba install -y -n test -c ./conda-packages tttrlib
      
      - name: Run tests on installed conda package
        shell: bash -l {0}
        run: |
          pytest test/ -v --tb=short --ignore=test/test_fsconv.py
