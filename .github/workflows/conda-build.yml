name: Conda Build

on:
  workflow_dispatch:
  push:
    branches: [ development ]
  release:
    types: [ released, prereleased ]
  schedule:
    # Every Monday at 11:00 UTC
    - cron: "0 11 * * 1"

jobs:
  build:
    name: CondaBuild (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.10" ]

    env:
      OUT_DIR: conda-bld
      ANACONDA_USER: tpeulen
      ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
      # If it's a release, use "main"; else "dev"
      UPLOAD_LABEL: ${{ startsWith(github.ref, 'refs/tags/') && (github.event_name == 'release') && (github.event.action == 'released' || github.event.action == 'prereleased') && 'main' || 'dev' }}

    steps:
      - name: Free Disk Space (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout (with tags & submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "Set SDK on macOS (if needed)"
        if: startsWith(matrix.os, 'macos')
        run: tools/install_macos_sdk.sh

      - name: Configure build for x86
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86

      - name: Set up micromamba (conda-forge strict)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          create-args: >-
            python=${{ matrix.python-version }}
            boa
            conda-build
            anaconda-client
            curl
          cache-downloads: true
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: strict

      - name: Display Conda Settings
        shell: bash -l {0}
        run: |
          micromamba run -n build conda info
          micromamba run -n build conda list
          micromamba run -n build conda config --show-sources
          micromamba run -n build conda config --show
          printenv | sort

      - name: Build (mambabuild)
        shell: bash -l {0}
        working-directory: conda-recipe
        run: |
          micromamba run -n build conda mambabuild . \
            --output-folder "${GITHUB_WORKSPACE}/${OUT_DIR}"

      - name: Upload to Anaconda.org (skip if no token)
        shell: bash -l {0}
        run: |
          if [[ -n "${ANACONDA_TOKEN}" ]]; then
            echo "Uploading packages to anaconda.org/${ANACONDA_USER} (label=${UPLOAD_LABEL})"
            micromamba run -n build anaconda -t "${ANACONDA_TOKEN}" upload \
              -u "${ANACONDA_USER}" \
              --label "${UPLOAD_LABEL}" \
              --force ${OUT_DIR}/**/*.tar.bz2
          else
            echo "ANACONDA_TOKEN is empty; skipping upload."
          fi

      - name: Keep built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conda-packages-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ env.OUT_DIR }}/**/*.tar.bz2
